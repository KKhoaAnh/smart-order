version: '3.8'

services:
  # ──────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smart_order_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: smart_order_db
      POSTGRES_USER: smart_order_user
      POSTGRES_PASSWORD: smart_order_pass_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smart_order_user -d smart_order_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smart_order_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # pgAdmin 4 (GUI quản lý PostgreSQL)
  # ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smart_order_pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local
